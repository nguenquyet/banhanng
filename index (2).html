<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cơ Khí Minh Hồng - Máy Nông Nghiệp Mắc Ca</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">
  <header class="bg-green-700 text-white py-4 shadow-lg sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
      <div class="flex items-center">
        <i class="fa-solid fa-gear text-3xl mr-3"></i>
        <div>
          <h1 class="text-2xl font-bold">CƠ KHÍ MINH HỒNG</h1>
          <p class="text-sm">Buôn Hồ, Đắk Lắk - Hotline: 0987.654.321</p>
        </div>
      </div>
      <div id="cartIcon" class="relative cursor-pointer">
        <i class="fa fa-shopping-cart text-2xl"></i>
        <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </div>
    </div>
  </header>

  <section class="bg-gradient-to-r from-green-600 to-green-800 text-white py-16 text-center">
    <h2 class="text-4xl font-bold mb-4">Máy Bóc Vỏ - Rửa - Phân Size Mắc Ca</h2>
    <p class="text-xl mb-6">Giải pháp tự động hóa cho nhà vườn & xưởng chế biến</p>
  </section>

  <section id="sanpham" class="max-w-6xl mx-auto px-4 py-12">
    <h2 class="text-3xl font-bold text-center mb-8 text-green-700">SẢN PHẨM NỔI BẬT</h2>
    <div id="danhSachSP" class="grid md:grid-cols-3 gap-6">
      <p class="col-span-3 text-center text-gray-500">Đang tải sản phẩm từ Google Sheet...</p>
    </div>
  </section>

  <footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <p class="font-bold text-lg mb-2">CƠ KHÍ MINH HỒNG</p>
      <p><i class="fa fa-map-marker-alt mr-1"></i> Buôn Hồ, Đắk Lắk</p>
      <p><i class="fa fa-phone mr-1"></i> Hotline/Zalo: 0987.654.321</p>
    </div>
  </footer>

  <!-- Form đặt hàng -->
  <div id="formDatHang" style="display:none; position:fixed; inset:0; background:#00000080; z-index:50;">
    <div class="bg-white max-w-md mx-auto mt-20 p-6 rounded-lg">
      <h3 class="text-xl font-bold mb-4">Đặt mua: <span id="tenSPForm" class="text-green-700"></span></h3>
      <input id="tenKH" placeholder="Tên của bạn *" class="border w-full p-2 mb-3 rounded">
      <input id="sdt" placeholder="Số điện thoại *" class="border w-full p-2 mb-3 rounded">
      <input id="diaChi" placeholder="Địa chỉ nhận hàng" class="border w-full p-2 mb-3 rounded">
      <textarea id="ghiChu" placeholder="Ghi chú thêm" class="border w-full p-2 mb-3 rounded"></textarea>
      <button onclick="guiDonHang()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded w-full font-bold">XÁC NHẬN ĐẶT HÀNG</button>
      <button onclick="document.getElementById('formDatHang').style.display='none'" class="mt-2 text-gray-500 w-full">Hủy</button>
    </div>
  </div>

  <script>
    // ===== DÁN URL APPS SCRIPT CỦA BẠN VÀO ĐÂY =====
    const API_URL = 'https://script.google.com/macros/s/THAY-URL-CUA-BAN/exec';
    // ===============================================
    
    let currentSP = {};
    let cart = [];

    function loadSanPham() {
      fetch(API_URL + '?action=getAllData')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('danhSachSP');
        list.innerHTML = data.sanPham.map(sp => `
          <div class="bg-white rounded-lg shadow-md hover:shadow-xl transition p-6">
            <h3 class="font-bold text-xl text-green-700 mb-2">${sp['Tên SP']}</h3>
            <div class="text-red-600 font-bold text-3xl mb-3">${Number(sp['Đơn giá']).toLocaleString('vi-VN')}đ</div>
            <p class="text-gray-600 text-sm mb-2">Tồn kho: ${sp['Tồn kho'] || 0} máy</p>
            <p class="text-gray-700 mb-4">${sp['Mô tả'] || ''}</p>
            <button onclick='openForm(${JSON.stringify(sp)})' 
                    class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded w-full font-bold">
              <i class="fa fa-shopping-cart mr-1"></i> Đặt Mua Ngay
            </button>
          </div>
        `).join('');
      })
      .catch(err => {
        document.getElementById('danhSachSP').innerHTML = '<p class="col-span-3 text-center text-red-500">Lỗi tải sản phẩm. Kiểm tra lại URL Apps Script.</p>';
      });
    }

    function openForm(sp) {
      currentSP = {ten: sp['Tên SP'], gia: Number(sp['Đơn giá']).toLocaleString('vi-VN') + 'đ'};
      document.getElementById('tenSPForm').innerText = currentSP.ten + ' - ' + currentSP.gia;
      document.getElementById('formDatHang').style.display = 'block';
    }

    function guiDonHang() {
      const data = {
        tenKH: document.getElementById('tenKH').value,
        sdt: document.getElementById('sdt').value,
        diaChi: document.getElementById('diaChi').value,
        ghiChu: document.getElementById('ghiChu').value,
        tenSP: currentSP.ten,
        gia: currentSP.gia
      };
      if(!data.tenKH || !data.sdt) return alert('Vui lòng nhập tên và SĐT');

      fetch(API_URL, {method: 'POST', body: JSON.stringify(data)})
      .then(res => res.json()).then(r => {
        alert('Đặt hàng thành công! Cơ Khí Minh Hồng sẽ gọi lại xác nhận.');
        document.getElementById('formDatHang').style.display='none';
        document.getElementById('tenKH').value = '';
        document.getElementById('sdt').value = '';
        document.getElementById('diaChi').value = '';
        document.getElementById('ghiChu').value = '';
      });
    }

    loadSanPham();
  </script>
</body>
</html>
